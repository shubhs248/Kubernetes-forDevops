# Exercise 2.1, Part B — the same app, managed by a Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  labels:
    app: hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello          # the Deployment manages Pods carrying this label
  template:
    metadata:
      labels:
        app: hello        # MUST match selector.matchLabels above
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
