# Exercise 2.3 — a ConfigMap whose key becomes a file (index.html)
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-config
data:
  index.html: |
    <!doctype html>
    <html>
      <body>
        <h1>Hello from a ConfigMap!</h1>
        <p>This page was injected into nginx without rebuilding the image.</p>
      </body>
    </html>
