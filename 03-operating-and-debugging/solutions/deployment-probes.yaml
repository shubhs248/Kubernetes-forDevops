# Exercise 3.2 — Deployment with readiness + liveness probes.
# nginx serves "/" with HTTP 200, so both probes pass and the Pod becomes Ready.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-probes
  labels:
    app: hello-probes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-probes
  template:
    metadata:
      labels:
        app: hello-probes
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          # "Ready to receive traffic?" — gates the Service, does NOT restart.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          # "Still alive?" — if it fails failureThreshold times, restart the container.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Optional: protect a slow-starting app. Liveness/readiness wait for this.
          # startupProbe:
          #   httpGet: { path: /, port: 80 }
          #   failureThreshold: 30
          #   periodSeconds: 2
