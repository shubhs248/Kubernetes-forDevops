# FIXED — the Service selector now matches the Pod labels exactly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web-frontend            # fixed: matches the Pod label -> endpoints populate
  ports:
    - port: 80
      targetPort: 80
