# BROKEN ON PURPOSE — produces CrashLoopBackOff.
# The container's main process exits immediately, so Kubernetes keeps restarting it.
# Diagnose with: kubectl logs <name> --previous
# Then fix it. The fixed version is in ../solutions/fixed-2-crashloop.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-crash
  labels:
    app: broken-crash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-crash
  template:
    metadata:
      labels:
        app: broken-crash
    spec:
      containers:
        - name: app
          image: busybox:1.36
          # This runs, prints, then EXITS 1 -> the container dies -> restart loop.
          command: ["sh", "-c"]
          args:
            - |
              echo "starting up..."
              sleep 2
              echo "required config missing, giving up"
              exit 1
